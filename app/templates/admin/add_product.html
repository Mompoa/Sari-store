{% extends "admin/base.html" %}

{% block title %}Add Product - Admin Panel{% endblock %}

{% block content %}
<div class="admin-header">
    <h1>Add New Product</h1>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="product-form">
        <fieldset>
            <legend>Product Information</legend>
            
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" required 
                       placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5"
                          placeholder="Enter detailed product description"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price (₱) *</label>
                    <input type="number" id="price" name="price" required step="0.01" min="0"
                           placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity *</label>
                    <input type="number" id="stock" name="stock" required min="0"
                           placeholder="0">
                </div>
            </div>

            <div class="form-group">
                <label for="image">Product Image</label>
                <div class="file-input-wrapper">
                    <input type="file" id="image" name="image" accept="image/*"
                           onchange="previewImage(event)">
                    <label for="image" class="file-label">
                        Choose Image
                    </label>
                </div>
                <small>Supported formats: PNG, JPG, JPEG, GIF, WebP (Max 16MB)</small>
                <div id="image-preview" class="image-preview"></div>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-large">Add Product</button>
            <a href="{{ url_for('admin.products') }}" class="btn btn-secondary btn-large">Cancel</a>
        </div>
    </form>
</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('image-preview');
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(file);
    } else {
        preview.innerHTML = '';
    }
}
</script>
{% endblock %}
